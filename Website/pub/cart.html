<!doctype html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart | The Low End</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 antialiased">
  <header class="sticky top-0 z-50 border-b border-gray-200 bg-white">
    <nav class="mx-auto flex w-full max-w-7xl items-center justify-between px-6 py-5">
      <a href="index.html" class="text-2xl font-semibold tracking-tight">The Low End</a>
      <div class="flex items-center gap-3">
        <a href="index.html" class="border border-gray-300 px-4 py-2 text-sm font-medium transition hover:border-gray-900">Verder shoppen</a>
        <a id="cartButton" href="cart.html" class="border border-gray-300 px-4 py-2 text-sm font-medium transition hover:border-sky-200 hover:bg-sky-50">Cart (0)</a>
      </div>
    </nav>
  </header>

  <main class="mx-auto w-full max-w-3xl px-6 py-12">
    <aside class="h-fit border border-gray-200 p-5">
      <h1 class="text-2xl font-semibold">Winkelwagen</h1>
      <div id="cartList" class="mt-4 space-y-2"></div>
      <div class="mt-4 flex items-center justify-between border-t border-gray-200 pt-3">
        <span class="font-medium">Totaal</span>
        <span id="cartTotal" class="font-semibold">€ 0,00</span>
      </div>
      <form id="checkoutForm" class="mt-8 space-y-3 border-t border-gray-200 pt-5">
        <h2 class="text-lg font-semibold">Bestellen</h2>
        <button class="w-full border border-gray-900 bg-gray-900 py-2 text-sm font-medium text-white transition hover:bg-sky-800">Bestelling plaatsen</button>
        <p id="feedback" class="mt-3 text-sm"></p>
      </form>
    </aside>
  </main>

  <script type="module" src="./js/cart-page.js"></script>
</body>
</html>
